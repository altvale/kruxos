    <rect x="0" y="0" width="280" height="174" rx="8" ry="8" fill="#10101c" stroke="#2d2d44" stroke-width="1"></rect>
    <rect x="0" y="0" width="4" height="174" rx="2" ry="2" fill="#1D9E75"></rect>

    
    <g transform="translate(24, 18)">
      <rect x="0" y="0" width="40" height="40" rx="6" ry="6" fill="#1D9E752E"></rect>
      <g>
      <g stroke="#1D9E75" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 10 14 L 10 9 M 16 14 L 16 9"></path>
