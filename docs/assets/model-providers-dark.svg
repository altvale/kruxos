<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" role="img" aria-labelledby="title desc">
  <title id="title">KruxOS Model Providers</title>
  <desc id="desc">A grid of six AI model providers supported by KruxOS: Anthropic Claude; OpenAI GPT and Codex; Google Gemini 2.x; OpenRouter, 200-plus models via a single API; Local runtimes including Ollama, vLLM, LM Studio and llama.cpp; and Bring-your-own, any OpenAI-compatible endpoint including DeepSeek, Grok, Mistral, Groq, GLM and custom.</desc>

  <defs>
    <pattern id="dot-dark" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#1D9E75" fill-opacity="0.1"></circle>
    </pattern>
  </defs>

  
  <rect x="0" y="0" width="920" height="460" fill="#08080f"></rect>
  <rect x="0" y="0" width="920" height="460" fill="url(#dot-dark)"></rect>

  
  <g id="header">
    
    <g transform="translate(35, 34)">
      <circle cx="0" cy="0" r="11" fill="#1D9E75"></circle>
      <circle cx="0" cy="0" r="5.5" fill="#08080f"></circle>
      <circle cx="0" cy="0" r="2.6" fill="#5DCAA5"></circle>
    </g>
    <text x="56" y="39" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="600" fill="#ededed">Model Providers</text>

    
    <g transform="translate(812, 22)">
